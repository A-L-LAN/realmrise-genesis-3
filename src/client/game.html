<!doctype html>
<html lang="en" class="h-full">

<head>

    <!-- =====================================================
         Basic Meta
    ====================================================== -->

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge"
    />

    <title>Realmrise: Genesis | One World. Every Choice Matters.</title>

    <meta
        name="description"
        content="Realmrise: Genesis is a persistent community-driven fantasy civilization game where every decision shapes a living world. Build kingdoms, forge alliances, wage wars, and return each day to witness the world's evolution."
    />

    <meta
        name="keywords"
        content="Realmrise, Genesis, Reddit, Devvit, Fantasy Strategy, Kingdom Builder, Civilization, Multiplayer, Living World, Phaser, React"
    />

    <meta
        name="author"
        content="Realmrise Team"
    />

    <meta
        name="theme-color"
        content="#1E293B"
    />

    <meta
        name="robots"
        content="index, follow"
    />

    <!-- =====================================================
         Open Graph
    ====================================================== -->

    <meta
        property="og:title"
        content="Realmrise: Genesis"
    />

    <meta
        property="og:description"
        content="One World. Every Choice Matters. Return Tomorrow to Shape Its Future."
    />

    <meta
        property="og:type"
        content="website"
    />

    <meta
        property="og:image"
        content="/images/social-preview.png"
    />

    <meta
        property="og:url"
        content="https://realmrise.com"
    />

    <!-- =====================================================
         Twitter Card
    ====================================================== -->

    <meta
        name="twitter:card"
        content="summary_large_image"
    />

    <meta
        name="twitter:title"
        content="Realmrise: Genesis"
    />

    <meta
        name="twitter:description"
        content="Build kingdoms. Shape history. Return every day."
    />

    <meta
        name="twitter:image"
        content="/images/social-preview.png"
    />

    <!-- =====================================================
         Icons
    ====================================================== -->

    <link
        rel="icon"
        href="/favicon.ico"
    />

    <link
        rel="apple-touch-icon"
        href="/icons/icon-192.png"
    />

    <!-- =====================================================
         Manifest
    ====================================================== -->

    <link
        rel="manifest"
        href="/manifest.json"
    />

    <!-- =====================================================
         Fonts
    ====================================================== -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <!-- =====================================================
         Global Styles
    ====================================================== -->

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {

            width: 100%;
            height: 100%;

            overflow: hidden;

            background: #0f172a;

            color: white;

            font-family: "Inter", sans-serif;

        }

        body {

            position: relative;

        }

        #root {

            width: 100%;
            height: 100%;

        }

        /* ==========================================
           Loading Screen
        =========================================== */

        #loading-screen {

            position: fixed;

            inset: 0;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            background:
                radial-gradient(circle at center,
                    #1e293b,
                    #0f172a);

            z-index: 999999;

            transition:
                opacity .6s ease,
                visibility .6s ease;

        }

        #loading-screen.hidden {

            opacity: 0;

            visibility: hidden;

            pointer-events: none;

        }

        #loading-logo {

            font-family: "Cinzel", serif;

            font-size: 3rem;

            color: #FFD166;

            margin-bottom: 18px;

            letter-spacing: 2px;

            text-align: center;

        }

        #loading-message {

            color: #CBD5E1;

            font-size: 1rem;

            animation: pulse 1.8s infinite;

        }

        @keyframes pulse {

            0% {
                opacity: .25;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: .25;
            }

        }

    </style>

</head>

<body class="h-full">

    <noscript>

        Realmrise: Genesis requires JavaScript to run.

    </noscript>

    <!-- ===============================================
         Loading Screen
    ================================================ -->

    <div id="loading-screen">

        <div id="loading-logo">

            Realmrise: Genesis

        </div>

        <div id="loading-message">

            Loading the Living World...

        </div>

    </div>

    <!-- ===============================================
         React Application Mount
    ================================================ -->

    <div
        id="root"
        class="h-full"
    ></div>

    <!-- ===============================================
         Devvit React Entry
         (DO NOT REMOVE)
    ================================================ -->

    <script
        type="module"
        src="game.tsx"
    ></script>

    <!-- ===============================================
         Remove Loading Screen
    ================================================ -->

    <script>

        function hideLoader() {

            const loader = document.getElementById("loading-screen");

            if (!loader) return;

            loader.classList.add("hidden");

            setTimeout(() => {

                loader.remove();

            }, 700);

        }

        window.addEventListener("load", hideLoader);

    </script>

</body>

</html>
